<!DOCTYPE html>
<html>
<head>
    <title>龙视界留言墙</title>
    <style>
        body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.8);
            border-radius: 15px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #3366cc;
            text-align: center;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            resize: vertical;
        }
        button {
            background: #3366cc;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .comment {
            margin-top: 20px;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .username {
            font-weight: bold;
            color: #3366cc;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>龙视界留言墙</h1>
        <p>分享你的感受，与千万网友共鸣...</p>
        <form action="https://formsubmit.co/wan5555cn@qq.com" method="POST">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_next" value="#">
            <textarea name="留言内容" rows="3" required></textarea>
            <button type="submit">发送留言</button>
        </form>
        
        <div class="comment">
            <span class="username">新用户：</span>测试QQ邮箱能不能收到邮件
        </div>
        <div class="comment">
            <span class="username">用户A：</span>特别喜欢《时代之光》的编曲！
        </div>
        <div class="comment">
            <span class="username">旅行者：</span>贵州织金的风景和音乐完美融合
        </div>
    </div>
</body>
</html>
