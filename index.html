    <style>
body {
		margin: 0;
		min-height: 100vh;
		background: conic-gradient(from 0deg, #FF6B6B, #4ECDC4, #45B7D1, #FF6B6B);
		background-size: 200% 200%;
		animation: gradient 8s ease infinite;
		padding-top: 20px;
		background-color: #bbbbbb;
		font-family: 'Microsoft YaHei', Arial, sans-serif;
		text-align: center;
	}
@keyframes gradient {
		0% { background-position: 0% 50%; }
		50% { background-position: 100% 50%; }
		100% { background-position: 0% 50%; }
	}
	/* 修改部分 - 固定顶部标题 */
.header {
		position: fixed; /* 新增 */
		top: 0;
		left: 0;
		width: 100%;
		z-index: 1000;
		background: #fff;
		box-shadow: 0 2px 5px rgba(0,0,0,0.1);
		padding: 12px 0;
		}
        h1 {
            color: #003366;
            text-align: center;
            margin: 0;
			line-height: 1.2;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            font-size: 32px;
        }
        h1:hover {
            transform: scale(1.05);
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 24px;
                padding: 10px 0;
				line-height: 1.2;
            }
        }
        :root {
            --shadow-color: rgba(0,0,0,0.2);
            --hover-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }
		.grid-container {
		position: relative;
		z-index: 1;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
	    grid-auto-rows: 1.5fr;
        gap: 10px;
	    border-top: 2px solid #aaa;
        padding: 8px;
        max-width: 1800px;
        margin: 0 auto;
        }
		/* 手机端适配 */
		@media (max-width: 1024px) {
		.grid-container {
		grid-template-columns: repeat(3, 1fr); /* 保持3列 */
		max-width: 100%; /* 全屏显示 */
		}
		.floating-btn {
        padding: 10px 20px;
        font-size: 14px;
        right: 15px;
        bottom: 15px;
		}
		}
        .grid-item {
        position: relative;
	    border-radius: 12px;
	    overflow: hidden;
	    box-shadow: 0 6px 15px var(--shadow-color);
	    transition: all 0.4s cubic-bezier (0.25, 0.8, 0.25, 1);
	    aspect-ratio: 4/3;
        }
        .grid-item:hover {
            transform: translateY(-8px);
            box-shadow: var(--hover-shadow);
        }
	        .grid-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.6));
            z-index: 1;
        }
        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .grid-item:hover img {
            transform: scale(1.05);
        }
        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            width: 60px;
            height: 60px;
            opacity: 0.9;
            transition: all 0.3s;
        }
        .grid-item:hover .play-btn {
            transform: translate(-50%, -50%) scale(1.1);
        }
        .video-title {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            z-index: 2;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
	/* 修改部分 - 粘性底部 */
	.taskbar-footer {
		position: fixed;
		bottom: 0;
		width: 100%;
		height: 32px;
		background: linear-gradient(#f0f0f0, #e0e0e0);
		border-top: 1px solid #999;
		display: flex;
		align-items: center;
		justify-content: space-between;
		padding: 0 15px;
		box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
		z-index: 1000;
		}
	a {
		text-decoration: none;
		color: #000000;
		}
	.start-menu {
		font-weight: bold;
		color: #003366;
		padding: 5px 10px;
		border-radius: 3px;
		}
	.task-icons {
		text-align: center;
		white-space: nowrap;
		overflow: visible;
		padding: 8px 12px;
		margin: 0 5px;
		border-radius: 3px;
		}
	.icon.active {
		background: rgba(0,51,102,0.1);
		border: 1px solid #003366;
		white-space: nowrap;
		cursor: pointer;
		}
	.icon {
		padding: 5px 10px;
		border-radius: 3px;
		cursor: pointer;
		}

    /* 悬浮按钮主样式 */
    .floating-btn {

      text-decoration: none;

      transition: transform 0.2s, box-shadow 0.2s;
    }
    .floating-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }	
    </style>
