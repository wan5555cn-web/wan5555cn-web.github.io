<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线音乐播放器</title>
    <style>
        body {
		height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
            margin: 0;
			overflow-y: auto;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: conic-gradient(from 0deg, #FFD700, #4ECDC4, #45B7D1, #FFD700);
            background-size: 200% 200%;
            animation: gradient 8s ease infinite;
            text-align: center;
			justify-content: center;
			display: flex;
			align-items: center;
			height: 100dvh;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .player {
            width: 320px;
            padding: 25px;
            background: linear-gradient(145deg, 
                #d4af37 0%, 
                #f9d423 50%, 
                #d4af37 100%);
            border-radius: 20px;
            box-shadow: 
                0 10px 30px rgba(212, 175, 55, 0.5),
                inset 0 -3px 10px rgba(0,0,0,0.2),
                inset 0 3px 10px rgba(255,255,255,0.4);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .player::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(to bottom, 
                rgba(255,255,255,0.6) 0%, 
                transparent 100%);
            border-radius: 20px 20px 0 0;
        }

        .song-info {
            margin: 15px 0 25px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(0,0,0,0.15);
            border-radius: 2px;
            margin: 20px 0;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, 
                #222 0%, 
                #444 100%);
            border-radius: 2px;
            position: relative;
            transition: width 0.1s linear;
        }

        .progress-thumb {
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 
                0 0 0 2px rgba(34,34,34,0.8),
                0 1px 3px rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .progress-container:hover .progress-thumb {
            opacity: 1;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #333;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-top: 20px;
        }

        .control-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: linear-gradient(145deg, 
                rgba(255,255,255,0.85) 0%, 
                rgba(255,255,255,0.35) 100%);
            border: none;
            box-shadow: 
                0 3px 8px rgba(0,0,0,0.2),
                inset 0 1px 0 rgba(255,255,255,0.5);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .play-icon {
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 16px solid #333;
            margin-left: 3px;
        }

        .pause-icon {
            width: 16px;
            height: 16px;
            display: flex;
            justify-content: space-between;
        }

        .pause-icon span {
            width: 4px;
            height: 100%;
            background: #333;
        }

        .volume-control {
            width: 120px;
            margin: 15px auto 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-slider {
            flex: 1;
            height: 4px;
            background: rgba(0,0,0,0.15);
            border-radius: 2px;
            cursor: pointer;
        }

        .volume-level {
            height: 100%;
            width: 70%;
            background: #444;
            border-radius: 2px;
        }

        audio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="player">
        <div class="song-info" id="song-title">未加载音乐</div>
        
        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar">
                <div class="progress-thumb"></div>
            </div>
        </div>
        
        <div class="time-display">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
        </div>
        
        <div class="controls">
            <button class="control-btn" id="play-btn">
                <div class="play-icon" id="play-icon"></div>
            </button>
        </div>
        
        <div class="volume-control">
            <div class="volume-slider" id="volume-slider">
                <div class="volume-level" id="volume-level"></div>
            </div>
        </div>
    </div>

    <audio id="audio" src="https://static.musicmuse.ai/audio/cmezl9uyp00x8rvp0o0n003bw/20260417/cmo2vooqa00aqv11womkmc92f/5HWV7xMw9WAEpm94ZUu57b.mp3"></audio>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const volumeSlider = document.getElementById('volume-slider');
        const volumeLevel = document.getElementById('volume-level');
        const songTitle = document.getElementById('song-title');

        // 播放/暂停切换
        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playIcon.innerHTML = '';
                playIcon.innerHTML = '<span></span><span></span>';
                playIcon.className = 'pause-icon';
            } else {
                audio.pause();
                playIcon.innerHTML = '';
                playIcon.className = 'play-icon';
            }
        }

        // 更新进度条
        function updateProgress(e) {
            const { duration, currentTime } = e.srcElement;
            const progressPercent = (currentTime / duration) * 100;
            progressBar.style.width = `${progressPercent}%`;
            
            // 更新时间显示
            const durationMinutes = Math.floor(duration / 60);
            let durationSeconds = Math.floor(duration % 60);
            if (durationSeconds < 10) durationSeconds = `0${durationSeconds}`;
            
            if (duration) {
                durationEl.textContent = `${durationMinutes}:${durationSeconds}`;
            }
            
            const currentMinutes = Math.floor(currentTime / 60);
            let currentSeconds = Math.floor(currentTime % 60);
            if (currentSeconds < 10) currentSeconds = `0${currentSeconds}`;
            currentTimeEl.textContent = `${currentMinutes}:${currentSeconds}`;
        }

        // 点击进度条跳转
        function setProgress(e) {
            const width = this.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        }

        // 音量控制
        function setVolume(e) {
            const width = this.clientWidth;
            const clickX = e.offsetX;
            const volume = clickX / width;
            audio.volume = volume;
            volumeLevel.style.width = `${volume * 100}%`;
        }

        // 设置歌曲信息
        function setSongInfo() {
            // 这里可以扩展为从音频文件读取元数据
            songTitle.textContent = "龙视界音乐播放器";
        }

        // 事件监听
        playBtn.addEventListener('click', togglePlay);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', () => {
            playIcon.innerHTML = '';
            playIcon.className = 'play-icon';
        });
        progressContainer.addEventListener('click', setProgress);
        volumeSlider.addEventListener('click', setVolume);

        // 初始化
        setSongInfo();
        audio.volume = 0.7;
        volumeLevel.style.width = '70%';
    </script>
	    <p id="songInfo"></p>
        <a href="top1.html" onclick="history.back()">返回列表</a>    
</body>
</html>
