<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐分类导航</title>
    <style>
        body {
            margin: 0;
            padding: 30px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: conic-gradient(from 0deg, #FF6B6B, #4ECDC4, #45B7D1, #FF6B6B);
            background-size: 200% 200%;
            animation: gradient 8s ease infinite;
            text-align: center;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        :root {
            --pop: #FF9E7D;
            --electronic: #FFB347;
            --rock: #7FC7D9;
            --classical: #D8BFD8;
            --hiphop: #FF6B6B;
            --jazz: #BA55D3;
        }
		.return-btn {
			display: inline-block;
			padding: 12px 24px;
			margin-bottom: 20px;  /* 与下方内容间距 */
			background: transparent;
			border: 1px solid rgba(var(--text-dark), var(--border-alpha));
			border-radius: 30px;
			color: var(--text-dark);
			font-weight: 600;
			text-decoration: none;
			transition: all 0.3s ease;
			cursor: pointer;
		}
	/* 交互效果 */
		.return-btn:hover {
			border-color: rgba(var(--text-dark), 0.6);
			background: rgba(255, 255, 255, 0.1);
			transform: translateY(-2px);
		}
		.return-btn:active {
			transform: translateY(1px);
		}
       .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            background: transparent;
            backdrop-filter: blur(10px);
        }
        .music-card {
			background: transparent;
			border-radius: 12px;
			padding: 20px;
			box-shadow: 0 4px 20px rgba(0,0,0,0.08);
			border-top: 5px solid;
			position: relative;
			background-color: rgba(0,0,0,0.01); /* 极低透明度底色解决JPG边缘锯齿 */
			}  
		.music-card::before {
			content: '';
			position: absolute;
			top: 2px;  /* 微调位置避免边框遮挡 */
			left: 2px;
			right: 2px;
			bottom: 2px;
			background: 
			linear-gradient(to bottom, rgba(255,255,255,0.2), rgba(255,255,255,0)), 
			var(--category-bg) center/cover;
			border-radius: 10px; /* 略小于父元素圆角 */
			z-index: -1;
			filter: brightness(1.1) contrast(0.9); /* 提升JPG明暗层次 */
		}			
		.pop { border-color: var(--pop); }
        .electronic { border-color: var(--electronic); }
        .rock { border-color: var(--rock); }
        .classical { border-color: var(--classical); }
        .hiphop { border-color: var(--hiphop); }
        .jazz { border-color: var(--jazz); }
		/* 分类图片定义 - 需准备6张浅色系JPG */
		.pop     { --category-bg: url('png1.png'); }
		.electronic { --category-bg: url('png2.png'); }
		.rock    { --category-bg: url('png3.png'); }
		.classical { --category-bg: url('png4.png'); }
		.hiphop  { --category-bg: url('png5.png'); }
		.jazz    { --category-bg: url('png6.png'); }
        .song-list {
            margin: 0;
            padding: 0;
            list-style: none;
        }
        .song-item {
            padding: 8px 0;
            color: #555;
            text-align: left;
        }
        .song-item a {
            color: inherit;
            text-decoration: none;
        }
        .song-item a:hover {
            text-decoration: underline;
        }
	.song-title {
		color: #FFD700; /* 使用高饱和金色 */
		text-shadow: 
        0 1px 3px rgba(0,0,0,0.3), /* 深色投影增强对比 */
        1px 1px 0 hsl(40,100%,30%); /* 暖色偏移阴影 */
		font-weight: 600;
		transition: all 0.3s ease;
		background: 
        linear-gradient(90deg, 
            transparent 0%, 
            rgba(255,215,0,0.15) 50%, 
            transparent 100%); /* 横向光晕效果 */
		}
/* 暗色背景下的增强方案 */
	.dark-background .song-title {
		color: #FFEE99; /* 提亮色调 */
		text-shadow: 
        0 0 8px rgba(255,238,153,0.7),
        0 2px 4px rgba(0,0,0,0.5);
		}
    </style>
</head>
<body>
    <a href="index.html" class="return-btn">← 返回视频页</a>
    <div class="music-grid">
        <div class="music-card pop">
            <h3>流行音乐</h3>
            <ul class="song-list">
                <li class="song-item"><a href="星辰大海.mp3" download>星辰大海 - 张杰</a></li>
                <li class="song-item"><a href="光的方向.mp3" download>光的方向 - 周深</a></li>
            </ul>
        </div>
        <div class="music-card electronic">
            <h3>电子音乐</h3>
            <ul class="song-list">
                <li class="song-item"><a href="Faded.mp3" download>Faded - Alan Walker</a></li>
                <li class="song-item"><a href="TheSpectre.mp3" download>The Spectre</a></li>
            </ul>
        </div>
        <div class="music-card rock">
            <h3>摇滚音乐</h3>
            <ul class="song-list">
                <li class="song-item"><a href="SweetChildOMine.mp3" download>Sweet Child O'Mine</a></li>
                <li class="song-item"><a href="BohemianRhapsody.mp3" download>Bohemian Rhapsody</a></li>
            </ul>
        </div>
        <div class="music-card classical">
            <h3>古典音乐</h3>
            <ul class="song-list">
                <li class="song-item"><a href="MoonlightSonata.mp3" download>月光奏鸣曲</a></li>
                <li class="song-item"><a href="FourSeasonsSpring.mp3" download>四季·春</a></li>
            </ul>
        </div>
        <div class="music-card hiphop">
            <h3>嘻哈音乐</h3>
            <ul class="song-list">
                <li class="song-item"><a href="LoseYourself.mp3" download>Lose Yourself</a></li>
                <li class="song-item"><a href="GodsPlan.mp3" download>God's Plan</a></li>
            </ul>
        </div>
        <div class="music-card jazz">
            <h3>爵士音乐</h3>
            <ul class="song-list">
                <li class="song-item"><a href="TakeFive.mp3" download>Take Five</a></li>
                <li class="song-item"><a href="FlyMeToTheMoon.mp3" download>Fly Me To The Moon</a></li>
            </ul>
        </div>
    </div>
</body>
</html>
